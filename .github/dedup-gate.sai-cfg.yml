# CI-only config for .github/workflows/dedup-gate.yml. NOT auto-loaded (the
# auto-discovered names are sai-cfg.yml / sai-cfg.yaml / indexer.yaml); the gate
# passes it explicitly via --config.
#
# The repo's root sai-cfg.yml targets the LOCAL ort/DuckDB path: the code-trained
# jina model (jinaai/jina-embeddings-v2-base-code, 768-d). The PR gate instead
# uses the Qdrant Cloud backend with SERVER-SIDE inference, and the CI cluster's
# Inference tab hosts intfloat/multilingual-e5-small (384-d). The model + dim
# below MUST match that cluster, or Qdrant rejects the collection / inference.
#
# The base index and the PR-head sync run with this same config, so the gate's
# seeded `duplicates --since` scan stays self-consistent.
backend: qdrant
model: intfloat/multilingual-e5-small
vector_dim: 384

# THRESHOLD CHOICE (read before lowering this):
# e5-small is a GENERAL-text model, so cosine runs high across structurally similar
# but logically distinct code. Measured on this repo (src/**): 0.93 -> largest 151,
# 0.95 -> 41, 0.97 -> 7, 0.98 -> 5, 0.99 -> 0.
#
# The gate is now ABSOLUTE (the seeded `duplicates --since` scan fails on ANY cluster
# the changed code participates in), not a relative count delta. At 0.98 the "5
# clusters" are entirely FORCED BOILERPLATE — thin `BackendHandle` actor-forwarders,
# rmcp/CLI resolve->call->print adapter handlers, and repetitive test arrange/act/
# assert scaffolding — over logic that is already single-sourced in src/search.rs.
# (Verified function-by-function across worker/search/app/mcp: zero refactorable
# duplication.) e5-small cannot separate that forced similarity from real duplication
# at ANY threshold, so we sit at 0.99, where it reports 0 clusters: the gate then
# only trips on near-VERBATIM copies (the copy-paste slop pattern) and stops blocking
# on boilerplate. The tradeoff is recall — a paraphrased re-implementation scoring
# 0.95-0.98 slips through. The real fix is a CODE-trained model (the root sai-cfg.yml
# already uses jinaai/jina-embeddings-v2-base-code, 768-d); host that server-side or
# run local ort inference in CI and a much lower, more sensitive threshold becomes
# usable. Re-tune whenever the model changes.
similarity:
  duplicate_min_score: 0.99
