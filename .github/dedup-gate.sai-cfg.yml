# CI-only config for .github/workflows/dedup-gate.yml. NOT auto-loaded (the
# auto-discovered names are sai-cfg.yml / sai-cfg.yaml / indexer.yaml); the gate
# passes it explicitly via --config.
#
# The repo's root sai-cfg.yml targets the LOCAL ort/DuckDB path: the code-trained
# jina model (jinaai/jina-embeddings-v2-base-code, 768-d). The PR gate instead
# uses the Qdrant Cloud backend with SERVER-SIDE inference, and the CI cluster's
# Inference tab hosts intfloat/multilingual-e5-small (384-d). The model + dim
# below MUST match that cluster, or Qdrant rejects the collection / inference.
#
# The base index and the PR-head sync run with this same config, so the gate's
# seeded `duplicates --since` scan stays self-consistent.
backend: qdrant
model: intfloat/multilingual-e5-small
vector_dim: 384

# THRESHOLD CHOICE (read before changing this):
# e5-small is a GENERAL-text model, so cosine runs high across structurally similar
# but logically distinct code. Measured on this repo (src/**, controlled local run):
#   0.95 -> largest 41 | 0.98 -> 11 clusters | 0.985 -> 2 | 0.99 -> 0.
#
# The gate is ABSOLUTE: the seeded `duplicates --since` scan fails on ANY cluster the
# changed code participates in. We run at 0.985 — one notch tighter than the historical
# 0.99. The only clusters surviving in the 0.985-0.99 band are SYMMETRIC bookkeeping
# pairs (begin_bulk/end_bulk in the Backend enum dispatch and the test mock) — forced
# look-alikes, not refactorable duplication. A PR that edits one of those pairs may trip
# the gate as a false positive; annotate the span with `sai-noduplicate` if so.
#
# RECALL CEILING (important): even at 0.985, e5 only catches near-VERBATIM, SAME-NAME
# copies. A *renamed* re-implementation scores ~0.978 on e5 (measured) and slips through
# at 0.98 / 0.985 / 0.99 alike — so 0.985 buys little real recall over 0.99. The proper
# fix is a CODE-trained model (the root sai-cfg.yml uses jinaai/jina-embeddings-v2-base-code,
# 768-d): it scores that same renamed copy 0.982 and catches it at 0.98 with ZERO false
# positives. Host jina server-side, or run local ort inference in CI, to use a genuinely
# sensitive threshold. Re-tune whenever the model changes.
similarity:
  duplicate_min_score: 0.985
