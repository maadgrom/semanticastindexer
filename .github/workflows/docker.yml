name: Docker image (GHCR)
# Builds the CI/CD images and publishes them to the GitHub Container Registry: a lean
# Alpine default (:latest) and a glibc `-full` (--features all, includes the ort embedder).
#
# Architecture strategy: QEMU emulation cannot finish a cold arm64 build inside GitHub's
# 6-hour job limit (DuckDB's bundled C++ dominates), so each arch builds natively —
# linux/amd64 on ubuntu-latest, linux/arm64 on ubuntu-24.04-arm (free for public repos).
# Non-PR builds push each arch by digest; the merge job stitches the digests into the
# tagged multi-arch manifests. Pull requests build both arches but push nothing.
#
# The Dockerfile stub-builds dependencies into a layer keyed on Cargo.toml/Cargo.lock,
# so the per-arch GHA layer caches survive source-only changes.
on:
  push:
    branches: [main]
    tags: ["v*.*.*", "[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker.yml"
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
# Superseded PR pushes cancel the in-flight build; pushes to main/tags never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant: [alpine, full]
        arch: [amd64, arm64]
        include:
          - variant: alpine # default :latest — musl, lean (no ort)
            target: alpine
          - variant: full # :*-full — glibc, --features all (adds ort)
            target: full
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # PRs only validate the build (no outputs); pushes publish by digest for the
      # merge job to assemble into the tagged multi-arch manifest.
      - name: Build (push by digest on non-PR)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.arch }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.arch }}
          provenance: true
          sbom: true
      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            suffix: ""
          - variant: full
            suffix: "-full"
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,format=short
      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046 # word splitting is intentional: expands "-t <tag>" pairs and digest refs
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
      - name: Inspect pushed manifest
        run: docker buildx imagetools inspect "$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
