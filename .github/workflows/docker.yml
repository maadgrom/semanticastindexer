name: Docker image (GHCR)

# Builds the CI/CD images and publishes them to the GitHub Container Registry: a lean
# Alpine default (:latest) and a glibc `-full` (--features all, includes the ort embedder).
#
# Speed notes:
#   - Pushes build multi-arch (amd64 + arm64); pull requests build amd64 only, because
#     arm64 runs under QEMU emulation and would dominate PR wall time.
#   - The Dockerfile stub-builds dependencies into a layer keyed on Cargo.toml/Cargo.lock,
#     so the GHA layer cache survives source-only changes.

on:
  push:
    branches: [main]
    tags: ["v*.*.*", "[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Superseded PR pushes cancel the in-flight build; pushes to main/tags never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine        # default :latest — musl, lean (no ort)
            target: alpine
            suffix: ""
          - variant: full          # :*-full — glibc, --features all (adds ort)
            target: full
            suffix: "-full"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,format=short

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          provenance: true
          sbom: true
