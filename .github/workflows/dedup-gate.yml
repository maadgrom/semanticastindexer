name: dedup-gate

# Dogfooding PR gate: builds THIS PR's semanticastindexer, indexes the BASE branch
# into a per-PR Qdrant collection (server-side inference), runs the real
# `sync --since` to bring the index to the PR head, then fails when the PR's CHANGED
# code in src/ near-duplicates code already indexed. It uses `duplicates --since`:
# clusters are SEEDED only from the files this PR changed, while the neighbour search
# spans the whole index — so a changed chunk that re-implements existing code is caught
# even when it joins a pre-existing cluster (a plain cluster-count delta misses that).
# Pre-existing duplicates among UNTOUCHED files never block; intentional matches can be
# annotated with `sai-noduplicate`. This is the only real end-to-end index run in CI
# (ci.yml's suite is mock-based).
#
# Requires repository secrets QDRANT_URL and QDRANT_API_KEY. Fork PRs don't
# receive secrets, so the job is skipped for them (see the job-level `if`).
#
# Branch protection note: path-filtered — unrelated PRs show it as "skipped".
# Do NOT mark it a required status check while path filters are in place.
on:
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'sai-cfg.yml'
      - '.github/dedup-gate.sai-cfg.yml'
      - '.github/workflows/dedup-gate.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  dedup-gate:
    name: near-duplicate gate (qdrant)
    # Secrets are not exposed to fork PRs; skip rather than fail there.
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      # One collection per PR: the gate MUTATES the index (base index + sync),
      # so concurrent PRs must never share a collection.
      SAI_COLLECTION: dedup_gate_pr_${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On pull_request the default checkout is the PR MERGE commit
          # (refs/pull/N/merge). Depth 2 also fetches both parents, so HEAD^1
          # (the base branch tip) is resolvable AND checkout-able.
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust # same cache namespace bump as ci.yml

      # qdrant (default feature) + ast chunker — exactly the paths the gate
      # exercises. Skips bundled DuckDB C++ and ort/ONNX, the slowest compiles;
      # those combos remain compile-checked by clippy/test/features in ci.yml.
      - name: Build sai from the PR source
        run: cargo build --locked --features ast

      - name: "Gate: fail when the PR's changed code duplicates existing code"
        shell: bash
        run: |
          set -euo pipefail

          MERGE_SHA=$(git rev-parse HEAD)     # PR merge commit
          BASE_SHA=$(git rev-parse HEAD^1)    # parent1 = base branch tip
          echo "merge commit: ${MERGE_SHA}  base tip: ${BASE_SHA}  collection: ${SAI_COLLECTION}"

          # CI-only config: Qdrant backend + server-side e5-small (384-d) to match
          # the cluster's Inference tab (the repo's sai-cfg.yml targets the local
          # jina/768 path). Copy it OUTSIDE the repo BEFORE the base checkout below
          # — that commit predates this file, so a tracked --config path would
          # vanish; $RUNNER_TEMP survives git checkout.
          CI_CFG="$RUNNER_TEMP/dedup-gate.sai-cfg.yml"
          cp .github/dedup-gate.sai-cfg.yml "$CI_CFG"

          # --config/--root/--ext precede any subcommand (--root/--ext are not
          # clap-global). duplicates/flush parse-but-ignore --root/--ext.
          SAI=(target/debug/semanticastindexer --config "$CI_CFG" --backend qdrant --collection "$SAI_COLLECTION" --root src --ext rs)

          # `sync`/`duplicates --since` shell out to `git diff --name-only <since>`. With
          # rename detection a rename lists only the NEW path, leaving the old path's
          # points stale. Disable: renames become delete+add, both refreshed/seeded.
          git config diff.renames false

          # 1) Index the BASE tree with the PR's own binary — the whole-DB haystack the
          #    changed code is searched against. --recreate drops any leftover collection
          #    from a cancelled prior run. target/ is gitignored, so it survives checkouts.
          git -c advice.detachedHead=false checkout --quiet "$BASE_SHA"
          "${SAI[@]}" --recreate --silent

          # 2) Back to the PR head and run the REAL incremental sync under test
          #    (base -> PR head). The index now reflects the merged tree.
          git checkout --quiet "$MERGE_SHA"
          "${SAI[@]}" sync --since "$BASE_SHA" --silent

          # 3) THE GATE: seed clustering ONLY from files this PR changed (BASE..HEAD) while
          #    searching the whole index. Any cluster => the changed code near-duplicates
          #    code already indexed (existing OR newly added) above the configured
          #    min_score. Unlike a cluster-count delta, this also catches slop that joins a
          #    pre-existing cluster. --path-glob scopes the haystack to src/** (sync may
          #    touch tests/*.rs); --max-clusters lifts the default cap of 50.
          OUT=$("${SAI[@]}" duplicates --since "$BASE_SHA" --path-glob 'src/**' --max-clusters 100000 --json --silent)
          COUNT=$(jq -r '.count' <<<"$OUT")

          echo "::group::near-duplicate clusters seeded by changed files (${COUNT})"
          jq '.clusters' <<<"$OUT"
          echo "::endgroup::"

          if [[ "$COUNT" != "0" ]]; then
            echo "::error title=near-duplicate code::this PR's changed code in src/ near-duplicates code already indexed (${COUNT} cluster(s); min_score from .github/dedup-gate.sai-cfg.yml). See the cluster members above. If a match is intentional, annotate the span with sai-noduplicate."
            exit 1
          fi
          echo "OK: the PR's changed code introduces no near-duplicates of indexed code"

      # Delete the per-PR collection so gate runs leave nothing behind on the
      # cluster. `flush` has no confirmation prompt, so it works headless. If a
      # cancelled run skips this, the next run's --recreate cleans up; and
      # dedup-gate-cleanup.yml flushes once more when the PR finally closes.
      # No --config/--embedder needed: this runs at the repo root, so it auto-discovers the
      # local duckdb sai-cfg.yml — but embedder resolution is backend-scoped, so that config's
      # `embedder: ort` does NOT leak into this `--backend qdrant` override; it resolves to
      # server-side `qdrant`. A bare `--features ast` (qdrant-only) binary thus flushes fine.
      - name: Cleanup per-PR collection
        if: always()
        shell: bash
        run: target/debug/semanticastindexer --backend qdrant --collection "$SAI_COLLECTION" flush --silent
