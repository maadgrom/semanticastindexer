# semanticastindexer configuration.
#
# Controls what gets embedded and pushed to the selected vector backend (Qdrant or
# DuckDB). Loaded by default from `indexer.yaml` in the current directory; override
# with `--config <path>`. CLI flags (--backend, --collection, --model, ...) take
# precedence over values here.
#
# These are sane GENERIC defaults: with the binary built `--features ort` you can
# index any project fully offline out of the box (local ONNX embedder + DuckDB).

# Vector backend: "qdrant" (default) or "duckdb". The CLI flag `--backend <name>`
# overrides this value. Qdrant uses Cloud server-side inference (creds via env
# QDRANT_URL / QDRANT_API_KEY — never put them here). DuckDB embeds locally (via the
# `ort` or `ollama` embedder) and stores vectors in a DuckDB file with a VSS/HNSW
# index; it needs the binary built with `--features ort` / `--features ollama`
# (or `all`).
backend: duckdb

# Embedder for the DuckDB backend (IGNORED by Qdrant, which embeds server-side):
#   ort     — local ONNX Runtime; downloads the model from `duckdb.model_repo` (default)
#   ollama  — remote Ollama HTTP server (see the `ollama:` block; `ollama.model` REQUIRED)
# CLI `--embedder <name>` overrides this. Default: ort.
embedder: ort

# Chunker — how each file is split into embeddable chunks. CLI `--chunker <name>` overrides.
#
# Smart default (new behavior):
#   - For languages with AST support (currently "ts" / "tsx") **and** the binary was
#     built with `--features ast` (or `all`): we default to the symbol-aware "ast" chunker.
#   - For everything else we fall back to the reliable "lines" chunker.
#
#   lines  — line-window chunker. ~MAX_LINES lines / `max_chunk_chars` chars per window
#            with a small overlap. No symbols. Always available.
#   ast    — tree-sitter, symbol-aware (only for TS/TSX today). Emits ONE chunk per
#            top-level function / const / class / interface / type-alias. Oversized
#            items are split intelligently while keeping the symbol. Remainder code
#            (imports, etc.) still becomes chunks. Requires `--features ast`.
#
#   NOTE: `ast` is feature-gated. If you select it (or it is auto-selected) on a binary
#         built without the feature, you get a clear actionable error.
#   NOTE: comments are stripped BEFORE chunking.
chunker: ast  # may be overridden at runtime to "ast" for ts/tsx when ast feature is present

# Max chunk size in CHARS — the size bound BOTH chunkers honor (a char approximation of
# the model's token window, ~4 chars/token; no tokenizer needed). When unset, it is
# defaulted by the embedder/model:
#   e5 / qdrant (512-token window)      → ~1400 chars  (keeps the historical behavior)
#   qwen / generic ollama (8K tokens)   → ~32000 chars (so whole functions fit)
# Set explicitly to override the model-aware default.
# max_chunk_chars: 1400

# Embedding prefix policy. When unset, AUTO-DETECTED from `model`:
#   model contains "e5"   → e5    (passage: <t> / query: <t>)
#   model contains "qwen" → qwen  (bare passage; query wrapped: "Instruct: …\nQuery: <q>")
#   otherwise             → none  (bare on both sides)
# Explicit values: e5 | qwen | none. Applied by BOTH local embedders AND the Qdrant
# Document path via one shared helper.
# prefix_style: e5

# Target collection (Qdrant) / table (DuckDB) + the embedding model label. For Qdrant
# this must match the cluster's Inference tab. `vector_dim` MUST equal the embedder
# model's output dimensionality and is validated at runtime — a mismatch is a clear
# error.
#
# Default when using embedder: ort (the common local DuckDB path):
#   jinaai/jina-embeddings-v2-base-code (768d, code-trained, symmetric → prefix_style: none)
# Default for Qdrant / other paths:
#   intfloat/multilingual-e5-small (384d)
collection: source_code
model: jinaai/jina-embeddings-v2-base-code
# When using the default ort embedder the resolved default is now the Jina code model
# (768d) and duckdb.model_repo will point at the matching HF repo.
vector_dim: 768

# DuckDB backend settings (only used when backend: duckdb). Ignored by Qdrant.
duckdb:
  # DuckDB database file. Created on first index; holds the table + HNSW index.
  path: .index/code.duckdb
  # ort embedder: HuggingFace repo to download `onnx/model.onnx` + `tokenizer.json`
  # from. Defaults to match the resolved `model`. For the recommended code model
  # (jinaai/jina-embeddings-v2-base-code) this is the same repo.
  # model_repo: jinaai/jina-embeddings-v2-base-code   # when using the Jina default for ort
  # model_repo: Xenova/multilingual-e5-small          # classic e5-small for ort
  # Optional ONNX/HF model cache dir for offline reuse. When set, the model is
  # downloaded/loaded from here instead of the default HF cache. (ort embedder only.)
  # model_cache: .model_cache

# Ollama embedder settings (only used when embedder: ollama). Apply E5-style
# passage:/query: prefixes — NON-E5 Ollama models may want different (or no) prefixes;
# adjust expectations accordingly.
ollama:
  # Ollama server URL. Default http://localhost:11434.
  # url: http://localhost:11434
  # Embedding model name. Defaults to mxbai-embed-large when unset. Must be an
  # embed-capable model you have pulled (`ollama pull mxbai-embed-large`).
  # IMPORTANT: set vector_dim to match the model — mxbai-embed-large = 1024
  # (nomic-embed-text = 768). So with the default model, set `vector_dim: 1024` above.
  # model: mxbai-embed-large

# Directory names pruned entirely during the walk (fast — never descended into).
# NOTE: the original SKIP_DIRS (node_modules, .git, dist, build, target, .next,
# coverage, .turbo) are ALWAYS pruned in code regardless of this list — listing
# them here too is harmless and explicit. Add project-specific dirs below.
exclude_dirs:
  - node_modules
  - .git
  - dist
  - build
  - target
  - .next
  - coverage
  - .turbo
  - __tests__ # every test directory
  # Project-specific examples — uncomment/edit for your repo:
  # - src/shared
  # - shared

# Allow-list. When non-empty, ONLY files matching one of these globs are considered
# (exclude still applies on top). Empty/omitted = consider everything. Same glob syntax
# as `exclude`. Example: index only services + hooks:
#   include:
#     - "src/services/**"
#     - "src/hooks/**"
include: []

# Glob patterns matched against each file's path (relative to where you run).
# '**' spans directories; '*' stays within one path segment.
exclude:
  # tests
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  # type declarations (no implementation logic)
  - "**/*.d.ts"
  # Project-specific example (shadcn/ui generated primitives) — uncomment for your repo:
  # - "**/components/ui/**"
  # autogenerated — TypeScript
  - "**/*.gen.ts"
  - "**/*.generated.ts"
  - "**/generated/**"
  # autogenerated — Go (for the later Go pass)
  - "**/*.pb.go"
  - "**/*_gen.go"
  - "**/*_generated.go"
  - "**/mock_*.go"
  - "**/zz_generated*.go"

# Skip files whose first lines carry an autogenerated marker, regardless of name
# (e.g. Go's `// Code generated ... DO NOT EDIT.`, or `@generated`). Catches
# autogenerated files that don't follow a naming convention.
skip_generated_marker: true

# Strip comments (// and /* */) from C-family source before embedding/pushing, so
# only code reaches Qdrant. String/template literals are preserved and line numbers
# stay accurate. Applies to TS now and Go later.
strip_comments: true

# Similarity-search thresholds for the `sai_find_similar` / `sai_find_duplicates` MCP tools AND
# the `similar` / `duplicates` CLI subcommands. Resolution per knob:
#   CLI flag / MCP tool arg  >  this config value  >  built-in default.
# These cutoffs are MODEL-SPECIFIC (a Qwen3 cosine of 0.85 is looser than e5's 0.85), so
# tune them for your embedder. Run `semanticastindexer similar --code "..." --min-score 0` to
# eyeball the raw score distribution, then set the cuts here. All fields optional.
# similarity:
#   find_similar_min_score: 0.85       # `similar`: drop neighbours below this cosine
#   duplicate_min_score: 0.93          # `duplicates`: edge cutoff between two chunks
#   duplicate_min_cluster_size: 2      # `duplicates`: smallest cluster to report
#   top_k: 10                          # `duplicates`: nearest-neighbour fan-out per chunk
